<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>
<link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">



<!-- tailwind+daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- font  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font intigration -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet"> 

     <!-- css link-->
      <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Navbar -->

<nav>
 <div class="flex gap-2 px-12">
     <img class="w-12 h-12 " src="assets/github-logo.png" alt="">
      <h2 class="text-3xl font-bold py-2">GitHub Issues Tracker</h2>
 </div>

<div>

<input id="searchInput" placeholder="Search issues">

<button onclick="searchIssues()">Search</button>
<button class="btn btn-primary font-medium text-xl py-3 px-4">+ New Issue</button>  

</div>

</nav>


<!-- Tabs -->

   <div class="tabs w-[80%] mx-auto  gap-5 bg-white rounded-xl py-12 px-12 mt-12 p-[20px]">
     <button onclick="loadIssues()">All</button>
     <button onclick="filterIssues('open')">Open</button>
     <button onclick="filterIssues('closed')">Closed</button>
   </div>


<!-- issues count -->

  <div class="flex w-[80%] mx-auto bg-white py-12 px-12 mt-12 gap-6 items-center">

  <!-- Logo -->
  <img class="w-12 h-12 bg-purple-200 rounded-full p-2"
  src="assets/Aperture.png" alt="">

  <!-- Issue Count -->
  <div>
    <h3 id="issueCount" class="text-3xl font-bold"></h3>
    <p class="text-gray-500">Track and manage your project issues</p>
  </div>

  <!-- Open / Closed Status -->
  <div class="flex gap-6 ml-auto">

    <!-- Open -->
    <div class="flex items-center gap-2">
      <img class="w-5" src="assets/open.png" alt="">
      <span id="openCount" class="font-semibold">0</span>
      <span>Open</span>
    </div>

    <!-- Closed -->
    <div class="flex items-center gap-2">
      <img class="w-5" src="assets/closed.png" alt="">
      <span id="closedCount" class="font-semibold">0</span>
      <span>Closed</span>
    </div>

  </div>

</div>


<!-- issues container -->

<div id="issuesContainer" class="w-[80%] mx-auto bg-gray-200"></div>



<!-- modal -->

<div id="issuesContainer" class="grid grid-cols-3 gap-6">
  <!-- সব issue card এখানে load হবে -->
</div>


<!-- ================= MODAL ================= -->

<div id="issueModal"
class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">

  <div class="bg-white p-6 rounded-xl w-[500px] shadow-lg">

    <h2 id="modalTitle" class="text-2xl font-bold mb-3"></h2>

    <p id="modalDescription" class="text-gray-600 mb-4"></p>

    <div class="text-right">
      <button onclick="closeModal()"
      class="bg-purple-600 text-white px-4 py-2 rounded">
        Close
      </button>
    </div>

  </div>

</div>

<!-- js connect -->

<script src="script.js"></script>

</body>
</html>
