<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>
<link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">



<!-- tailwind+daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- font  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

     <!-- css link-->
      <link rel="stylesheet" href="style.css">

</head>

<body>
<!-- Navbar -->
<header>
    <nav class="fixed top-0 left-0 w-full bg-white shadow-xl p-4 z-50 flex flex-col md:flex-row md:justify-between md:items-center gap-3">

  <div class="flex items-center gap-2 px-2 md:px-12">
    <img class="w-10 h-10 md:w-12 md:h-12" src="assets/github-logo.png" alt="">
    <h2 class="text-xl md:text-3xl font-bold">GitHub Issues Tracker</h2>
  </div>

  <div class="flex gap-2 md:space-x-4">
    <input class="btn btn-outline text-gray-800 md:w-auto" id="searchInput" placeholder="Search issues....">
    <button class="btn btn-primary" onclick="searchIssues()">Search</button>
  </div>

</nav>
</header>


<!-- Filter Buttons -->
<section>
    <div class="flex flex-wrap gap-3 mb-4 w-[95%] md:w-[80%] mx-auto bg-white rounded-lg shadow-xl py-6 px-6 mt-32 border border-gray-200 justify-center md:justify-start">

  <button id="all" class="filter-btn bg-blue-700 btn btn-outline text-white px-4 py-2 rounded" onclick="filterIssues('all')">All</button>

  <button id="open" class="filter-btn bg-gray-200 btn btn-outline text-gray-800 px-4 py-2 rounded" onclick="filterIssues('open')">Open</button>

  <button id="closed" class="filter-btn bg-gray-200 btn btn-outline text-gray-800 px-4 py-2 rounded" onclick="filterIssues('closed')">Closed</button>

</div>
</section>


<!-- Summary Section -->
<section>
    <div class="flex flex-col md:flex-row gap-6 w-[95%] md:w-[80%] mx-auto bg-white shadow-md border border-gray-200 py-8 px-6 mt-10 items-center rounded-lg">

  <img class="w-12 h-12 bg-purple-200 rounded-full p-2" src="assets/Aperture.png" alt="">

  <div class="text-center md:text-left">
    <h3 id="issueCount" class="text-2xl md:text-3xl font-bold"></h3>
    <p class="text-gray-500">Track and manage your project issues</p>
  </div>

  <div class="flex gap-6 md:ml-auto">

    <div class="flex items-center gap-2">
      <img class="w-5" src="assets/open.png" alt="">
      <span id="openCount" class="font-semibold">0</span>
      <span>Open</span>
    </div>

    <div class="flex items-center gap-2">
      <img class="w-5" src="assets/closed.png" alt="">
      <span id="closedCount" class="font-semibold">0</span>
      <span>Closed</span>
    </div>

  </div>

</div>
</section>
 
 <section id="spinner" class="flex justify-center items-center py-10 hidden">
     <span class="loading loading-bars loading-xl"></span>
 </section>

<!-- Issues Grid -->
<section>
   <div id="issuesContainer"
    class="w-[95%] md:w-[80%] mx-auto bg-gray-200 border-t-2 p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
   </div>
</section>


<!-- Modal -->
<div id="issueModal" class="fixed inset-0 hidden items-center justify-center bg-black/40 p-4">

  <div class="bg-white w-full max-w-2xl rounded-xl shadow-xl p-6 md:p-8">

    <h1 id="title" class="text-2xl md:text-3xl font-bold text-gray-800 mb-4"></h1>

    <div class="flex flex-wrap items-center gap-3 mb-6">
      <span id="status" class="px-3 py-1 text-sm rounded-full bg-green-500 text-white"></span>

      <p class="text-gray-500 text-sm">
        Opened by <span id="author"></span> • <span id="date"></span>
      </p>
    </div>

    <div id="labels" class="flex flex-wrap gap-3 mb-6"></div>

    <p id="description" class="text-gray-600 mb-6"></p>

    <div class="bg-gray-100 rounded-lg p-5 flex flex-col md:flex-row gap-4 md:justify-between md:items-center mb-6">

      <div>
        <p class="text-gray-500 text-sm">Assignee:</p>
        <h3 id="assignee" class="font-semibold text-lg"></h3>
      </div>

      <div class="text-center">
        <p class="text-gray-500 text-sm">Priority:</p>
        <span id="priority" class="bg-red-500 text-white text-xs px-4 py-1 rounded-full"></span>
      </div>

    </div>

    <div class="flex justify-end">
      <button class="bg-gradient-to-r from-purple-600 to-blue-600 text-white px-6 py-2 rounded-lg" onclick="closeModal()">
        Close
      </button>
    </div>

  </div>

</div>
    <script src="script.js"></script>

</body>
</html>
