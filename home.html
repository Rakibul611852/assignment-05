<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- tailwind+daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


     <link rel="stylesheet" href="style.css">

</head>

<body>
      <header>
        <div class="navbar bg-base-100 shadow-sm px-10 sm:col-3">
           <div class="flex flex-1 gap-3 mx-auto">
              <img class="max-h-10" src="assets/github-logo.png" alt="">
              <h2 class="font-semibold mx-h-[37px] text-3xl">GitHub Issues Tracker</h2>
           </div>
                <div class="flex md:gap-x-12 sm:flex-1">
                 <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                   <div class="dropdown dropdown-end">
                      <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
                         <button class="btn btn-primary ">+ New Issue</button>
                      </div>
                   </div>
                </div>
        </div>
      </header>

   <section>
       <div class="w-11/12 mx-auto bg-slate-100 py-10 mt-15 px-8 gap-x-9">
             <button class="btn btn-outline hover:bg-blue-700 hover:text-white md:px-[49px] md:py-[12px]">All</button>
             <button class="btn btn-outline hover:bg-blue-700 hover:text-white md:px-[49px] md:py-[12px]">Open</button>
             <button class="btn btn-outline hover:bg-blue-700 hover:text-white md:px-[49px] md:py-[12px]">Closed</button>
       </div>
   </section>


</body>
</html>
