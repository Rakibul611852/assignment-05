<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">


    <!-- tailwind+daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- css link -->
     <link rel="stylesheet" href="style.css">

  
</head>
<body>

<div class="min-h-screen w-[95%] sm:w-[90%] md:max-w-[520px] mx-auto mt-10 md:mt-[70px] bg-white rounded-xl p-4 md:p-6 shadow-xl">

  <!-- Logo -->
  <div class="logo w-full max-w-[263px] pt-6 mx-auto">
    <img class="mx-auto w-16 md:w-auto" src="assets/github-logo.png" alt="">
    
    <h1 class="text-center mt-6 md:mt-8 font-bold text-xl md:text-2xl">
      GitHub Issues Tracker
    </h1>

    <p class="text-center text-gray-500 mt-2 text-sm md:text-base">
      Sign in to manage your issues
    </p>
  </div>


  <!-- Form -->
  <div class="form mt-4">

    <div class="card w-full mx-auto rounded-2xl">
      <div class="card-body p-4 md:p-6">

        <fieldset class="fieldset space-y-2">

          <label class="label text-neutral font-normal text-sm md:text-[16px]">
            Username
          </label>

          <input
            id="input-username"
            type="text"
            class="input rounded-xl bg-base-200 w-full"
            placeholder="Enter Username"
          />

          <p class="text-blue-700 text-xs md:text-sm">Default: admin</p>


          <label class="label text-neutral mt-3 font-normal text-sm md:text-[16px]">
            Password
          </label>

          <input
            id="input-password"
            type="password"
            class="input rounded-xl bg-base-200 w-full"
            placeholder="Enter Password"
          />

          <p class="text-blue-700 text-xs md:text-sm">Default: admin123</p>

          <button
            id="signin-btn"
            class="btn btn-primary mt-4 rounded-xl w-full"
          >
            Sign In
          </button>

        </fieldset>

      </div>
    </div>

  </div>


  <!-- OR -->
  <div class="flex items-center text-gray-700 my-6">
    <div class="flex-grow border-t border-gray-300"></div>
    <span class="mx-3 font-semibold text-sm">OR</span>
    <div class="flex-grow border-t border-gray-300"></div>
  </div>


  <!-- Demo Credentials -->
  <div>
    <h2 class="text-center mt-2 text-sm text-gray-500">
      Demo Credentials:
    </h2>

    <div class="bg-gray-100 py-6 mt-3 text-center text-gray-600 w-full sm:w-11/12 mx-auto font-medium rounded-lg">
      <p>Username: admin</p>
      <p>Password: admin123</p>
    </div>
  </div>

</div>
           <script src="login.js"></script>
  </div>
</body>
</html>
