<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">


    <!-- tailwind+daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- css link -->
     <link rel="stylesheet" href="style.css">

  
</head>
<body>

  <div class="min-h-[770px] max-w-[520px]  mx-auto mt-[70px] bg-white rounded-xl p-3 shadow-xl">

       <div class="logo w-[263px] pt-[30px] mx-auto ">
         <img class=" mx-auto" src="assets/github-logo.png" alt="">
         <h1 class=" text-center mt-[32px] font-bold text-2xl">GitHub Issues Tracker</h1>
         <p class=" text-center text-gray-500 mt-2">Sign in to manage your issues</p>
       </div>
     
       <div class="form ">
          <div class="card  w-full mx-auto rounded-2xl">
                <div class="card-body">

                    <fieldset class="fieldset">

                        <label class="label text-neutral font-normal text-[16px]">Username</label>
                        <input id="input-username"  type="Enter your username" class="input rounded-xl bg-base-200 w-full mx-auto" placeholder="Enter Username" />

                        <p class="text-blue-700 text-sm">Default: admin</p>

                        
                        <label class="label  text-neutral mt-3 font-normal text-[16px]">Password</label>
                        <input id="input-password" type="input-password" class="input rounded-xl bg-base-200 w-full mx-auto" placeholder="Enter Password" />
                        <p class="text-blue-700 text-sm">Default: admin123</p>

                        <button id="signin-btn" class="btn btn-primary mt-4  rounded-xl">Sign In</button>

                    </fieldset>

                </div>
           </div>
      </div>

       <div class="flex items-center text-gray-700 my-4">
  <div class="flex-grow border-t border-gray-300"></div>
  <span class="mx-3 font-semibold">OR</span>
  <div class="flex-grow border-t border-gray-300"></div>
</div>
            
           <div>
              <h2 class="text-center mt-[20px] text-sm text-gray-500">Demo Credentials:</h2>
              <div class="bg-gray-100 py-[24px] mt-[10px] text-center text-gray-600 w-11/12 mx-auto font-medium pb-6">
                   <p>Username: admin </p>
                   <p>Password: admin123</p>
              </div>
           </div>


           <script src="login.js"></script>
  </div>
</body>
</html>
